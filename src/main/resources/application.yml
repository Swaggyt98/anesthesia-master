server:
  port: 8080
  address: 0.0.0.0

spring:
  application:
    name: project
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/anesthesia}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          lob:
            non_contextual_creation: true

stomp:
  server:
    url: ws://10.242.20.251:8080/ws
  # 订阅特定设备：/data/sub/{deviceId}，deviceId 是设备MAC地址
  # 订阅所有设备：/data/sub/all
  topic: /data/sub/5A:48:68:5E:5B:FA
  # 设备MAC地址（用于从绑定接口查询surgeryId）
  device-id: 5A:48:68:5E:5B:FA
  # 绑定查询间隔（毫秒），默认5秒
  binding-check-interval: 5000

device:
  binding:
    url: http://10.242.20.251:8080/device/binding/device/

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.medical.pojo
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

auth:
  enabled: false
  shared-secret: ""
  header: Authorization
  bearer-prefix: "Bearer "
  ignore-paths: /error,/actuator/**

jwt:
  secret: ${JWT_SECRET}
  expiration: 18000000
logging:
  file:
    name: app.log
    path: .
  level:
    root: INFO
    com.medical: INFO
    org.springframework: INFO
    org.hibernate: WARN
    org.springframework.web.socket: WARN
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %5p %5pid --- [%15.15t] %-40.40logger{39} : %m%n"
    file: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %5p %5pid --- [%15.15t] %-40.40logger{39} : %m%n"
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30
      total-size-cap: 1GB
